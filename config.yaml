# ChkApi v2.0 Configuration File
# Extended configuration with comprehensive options

scanner:
  concurrency:
    js_requests: 50
    api_requests: 100
    max_depth: 3
    timeout: 30
    max_retries: 3
    probe: false  # 并发探测选项（可选，开启需谨慎）
  
  filters:
    danger_api_filter: true
    off_target_filter: true
    dedupe_filter: true
    extension_filter: true
  
  bypass:
    enabled: true
    techniques:
      - header_injection
      - method_tampering
      - path_traversal
      - encoding_bypass
  
  js_analysis:
    use_ast: true
    extract_routes: true
    extract_dynamic_imports: true
    webpack_resolution: true
    fingerprint_cache: true

storage:
  database:
    path: "./results/{target}/results.db"
    wal_mode: true
    cache_size: 64
    synchronous: "off"
    temp_store: "memory"
  
  file_storage:
    base_dir: "./results"
    formats:
      - json
      - excel
      - html
    save_responses: true
  
  cache:
    js_fingerprint: true
    api_results: true
    ttl: 86400

ai:
  enabled: false
  provider: "deepseek"
  base_url: "https://api.deepseek.com/v1"
  api_format: "openai"
  model: "deepseek-chat"
  api_key: ""
  max_tokens: 2000
  temperature: 0.7
  timeout: 60
  
  api_keys:
    anthropic: ""
    openai: ""
    gemini: ""
    deepseek: ""
    mistral: ""
    ollama: ""
    custom: ""
  
  model_preferences:
    anthropic: "claude-sonnet-4-20250514"
    openai: "gpt-4o"
    gemini: "gemini-2.0-flash"
    deepseek: "deepseek-chat"
    mistral: "mistral-large-latest"
    ollama: "llama3.2"
    custom: "gpt-4o"
  
  thresholds:
    high_value_api_score: 5
    sensitive_confidence: 0.8
    vuln_confidence: 0.75
  
  analysis:
    api_priority: true
    sensitive_detection: true
    vuln_verification: true
    response_analysis: true

reporting:
  formats:
    - json
    - html
    - excel
  
  sections:
    - summary
    - api_inventory
    - vulnerabilities
    - sensitive_data
    - service_analysis
    - attack_surface
  
  visualizations:
    attack_surface_map: true
    risk_heatmap: true
    api_timeline: false

rules:
  fingerprint:
    - id: shiro
      name: Shiro
      pattern: "(=deleteMe|rememberMe=)"
      severity: medium
    
    - id: swagger
      name: Swagger UI
      pattern: "(swagger-ui.html|\"swagger\":|Swagger UI)"
      severity: medium
    
    - id: druid
      name: Druid Console
      pattern: "(Druid Stat Index)"
      severity: medium
  
  sensitive:
    - id: aws_key
      name: AWS Access Key
      pattern: "(AKIA|ABIA|ACCA|ASIA)[A-Z0-9]{16}"
      severity: critical
    
    - id: github_token
      name: GitHub Token
      pattern: "ghp_[a-zA-Z0-9]{36}"
      severity: high
    
    - id: jwt_token
      name: JWT Token
      pattern: "eyJ[A-Za-z0-9_-]{10,}\\.[A-Za-z0-9._-]{10,}={0,2}"
      severity: medium
    
    - id: private_key
      name: Private Key
      pattern: "-----BEGIN [A-Z ]+PRIVATE KEY-----"
      severity: critical

logging:
  level: "INFO"
  file: "ChkApi.log"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  max_size: 10485760
  backup_count: 5

performance:
  connection_pool_size: 100
  keep_alive: true
  compress: false
  batch_size: 1000
