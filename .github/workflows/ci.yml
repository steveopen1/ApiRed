name: ApiRed CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest aiohttp
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short || echo "No tests configured"

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Build
      run: |
        python -m py_compile apired.py cli.py
        echo "Build successful"

  scan:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'schedule'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: pip install -r requirements.txt
    
    - name: Run scheduled scan
      run: |
        python3 apired.py -u ${{ secrets.TEST_TARGET }} --at 1 -o ./scan-results || true
    
    - name: Upload scan results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: scan-results-${{ github.run_number }}
        path: ./scan-results/
        retention-days: 7
