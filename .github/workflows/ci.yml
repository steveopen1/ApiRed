name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        pytest tests/ -v --tb=short
    
    - name: Run lint
      run: |
        pylint core/ --disable=all --enable=E,F
    
    - name: Security scan
      run: |
        pip install safety bandit
        safety check
        bandit -r core/

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Build
      run: |
        python -m py_compile core/**/*.py
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: apired
        path: dist/
