# ApiRed Sensitive Information Detection Rules
# 基于 0x727/ChkApi 规则库
# 用于检测响应中的敏感信息
# 当前规则数: 230+

rules:
  # ==================== Fingerprint 指纹 ====================
  - group: Fingerprint
    rule:
      - name: Shiro
        loaded: true
        f_regex: (=deleteMe|rememberMe=)
        scope: any
        sensitive: true
        description: Shiro 认证框架指纹

      - name: JSON Web Token
        loaded: true
        f_regex: (eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9._-]{10,}|eyJ[A-Za-z0-9_\/+-]{10,}\.[A-Za-z0-9._\/+-]{10,})
        scope: any
        sensitive: true
        description: JWT 令牌

      - name: Swagger UI
        loaded: true
        f_regex: ((swagger-ui\.html)|("swagger":)|(Swagger UI)|(swaggerUi)|(swaggerVersion))
        scope: response body
        sensitive: false
        description: Swagger API 文档

      - name: Ueditor
        loaded: true
        f_regex: (ueditor\.(config|all)\.js)
        scope: response body
        sensitive: false
        description: Ueditor 编辑器

      - name: Druid
        loaded: true
        f_regex: (Druid Stat Index)
        scope: response body
        sensitive: false
        description: Druid 监控

      - name: Spring Boot
        loaded: true
        f_regex: ((spring-boot-starter)|(spring-boot-actuator)|(Whitelabel Error Page))
        scope: response body
        sensitive: false
        description: Spring Boot 指纹

      - name: Apache Shiro
        loaded: true
        f_regex: ((shiro)|(Session Timeout)|(Unauthorized)|(Forced Login))
        scope: response body
        sensitive: false
        description: Apache Shiro 认证

      - name: Django
        loaded: true
        f_regex: ((CSRF verification failed)|(CSRF token missing)|(Django Administration))
        scope: response body
        sensitive: false
        description: Django 指纹

      - name: Laravel
        loaded: true
        f_regex: ((laravel_session)|(XSRF-TOKEN)|(Whoops\Exception))
        scope: response body
        sensitive: false
        description: Laravel 指纹

      - name: ThinkPHP
        loaded: true
        f_regex: ((ThinkPHP)|(app\\\\think\\\\)|(Runtime\\\\ logs))
        scope: response body
        sensitive: false
        description: ThinkPHP 指纹

      - name: Struts2
        loaded: true
        f_regex: ((Struts Problem Report)|(struts2)|(No result defined))
        scope: response body
        sensitive: false
        description: Struts2 指纹

      - name: Fastjson
        loaded: true
        f_regex: ((fastjson)|(com.alibaba.fastjson)|(autotype))
        scope: response body
        sensitive: false
        description: Fastjson 指纹

      - name: Jackson
        loaded: true
        f_regex: ((com.fasterxml.jackson)|(jackson-databind)|(JSON parse error))
        scope: response body
        sensitive: false
        description: Jackson 指纹

      - name: Nexus Repository
        loaded: true
        f_regex: ((nexus-webapp)|(Sonatype Nexus)|(repository\.sonatype\.org))
        scope: response body
        sensitive: false
        description: Nexus 仓库指纹

      - name: Jenkins
        loaded: true
        f_regex: ((Jenkins)|(jenkins\.ci)|(Dashboard[^/]*$))
        scope: response body
        sensitive: false
        description: Jenkins 指纹

      - name: Grafana
        loaded: true
        f_regex: ((Grafana)|(grafana\.com)|(public dashboard))
        scope: response body
        sensitive: false
        description: Grafana 指纹

      - name: Kibana
        loaded: true
        f_regex: ((Kibana)|(kibana\.com)|(Elasticsearch))
        scope: response body
        sensitive: false
        description: Kibana 指纹

      - name: Apollo
        loaded: true
        f_regex: ((Apollo)|(apollo-portal)|(Config Portal))
        scope: response body
        sensitive: false
        description: Apollo 配置中心指纹

      - name: Nacos
        loaded: true
        f_regex: ((Nacos)|(nacos\.io)|(NamingService))
        scope: response body
        sensitive: false
        description: Nacos 指纹

      - name: Seata
        loaded: true
        f_regex: ((Seata)|(tc/session_sync)|(GlobalTransaction))
        scope: response body
        sensitive: false
        description: Seata 分布式事务指纹

      - name: Sentinel
        loaded: true
        f_regex: ((Sentinel)|(sentinel\.dashboard)|(Degraded))
        scope: response body
        sensitive: false
        description: Sentinel 指纹

      - name: Dubbo
        loaded: true
        f_regex: ((dubbo)|(DubboBox)|(provider\.|consumer\.))
        scope: response body
        sensitive: false
        description: Dubbo 指纹

      - name: ZooKeeper
        loaded: true
        f_regex: ((ZooKeeper)|(zookeeper)|(ensemble\.service\.dns))
        scope: response body
        sensitive: false
        description: ZooKeeper 指纹

      - name: Redis
        loaded: true
        f_regex: ((Redis)|(redis)|(DENIED Redis))
        scope: response body
        sensitive: false
        description: Redis 指纹

      - name: MongoDB
        loaded: true
        f_regex: ((MongoDB)|(mongodb)|(It seems like you are trying))
        scope: response body
        sensitive: false
        description: MongoDB 指纹

      - name: MySQL
        loaded: true
        f_regex: ((MySQL)|(mysql)|(Server version))
        scope: response body
        sensitive: false
        description: MySQL 指纹

      - name: PostgreSQL
        loaded: true
        f_regex: ((PostgreSQL)|(postgres)|(psql))
        scope: response body
        sensitive: false
        description: PostgreSQL 指纹

      - name: Oracle
        loaded: true
        f_regex: ((Oracle)|(oracle)|(ORA-\d{5}))
        scope: response body
        sensitive: false
        description: Oracle 指纹

      - name: MSSQL
        loaded: true
        f_regex: ((Microsoft SQL Server)|(mssql)|(SqlServer))
        scope: response body
        sensitive: false
        description: MSSQL 指纹

      - name: Elasticsearch
        loaded: true
        f_regex: ((elasticsearch)|(ES_\d+)|(cluster_name))
        scope: response body
        sensitive: false
        description: Elasticsearch 指纹

      - name: RabbitMQ
        loaded: true
        f_regex: ((RabbitMQ)|(rabbitmq)|(Mnesia))
        scope: response body
        sensitive: false
        description: RabbitMQ 指纹

      - name: ActiveMQ
        loaded: true
        f_regex: ((ActiveMQ)|(activemq)|(broker\.xml))
        scope: response body
        sensitive: false
        description: ActiveMQ 指纹

      - name: Kafka
        loaded: true
        f_regex: ((Kafka)|(kafka)|(zookeeper\.connect))
        scope: response body
        sensitive: false
        description: Kafka 指纹

      - name: etcd
        loaded: true
        f_regex: ((etcd)|(Etcd)|(etcd-server))
        scope: response body
        sensitive: false
        description: etcd 指纹

      - name: Consul
        loaded: true
        f_regex: ((Consul)|(consul)|(catalog\.consul))
        scope: response body
        sensitive: false
        description: Consul 指纹

      - name: Prometheus
        loaded: true
        f_regex: ((Prometheus)|(prometheus)|(Prometheus is))
        scope: response body
        sensitive: false
        description: Prometheus 指纹

      - name: Docker API
        loaded: true
        f_regex: ((Docker)|(docker)|(Containersocker))
        scope: response body
        sensitive: false
        description: Docker API 指纹

      - name: Kubernetes API
        loaded: true
        f_regex: ((kubernetes)|(kube)|(KUBERNETES))
        scope: response body
        sensitive: false
        description: Kubernetes API 指纹

      - name: Vault
        loaded: true
        f_regex: ((Vault)|(vault)|(HashiCorp Vault))
        scope: response body
        sensitive: false
        description: Vault 指纹

      - name: minIO
        loaded: true
        f_regex: ((minio)|(MinIO)|(play\.minio))
        scope: response body
        sensitive: false
        description: MinIO 指纹

      - name: WordPress
        loaded: true
        f_regex: ((wp-content)|(wp-includes)|(wordpress))
        scope: response body
        sensitive: false
        description: WordPress 指纹

      - name: phpMyAdmin
        loaded: true
        f_regex: ((phpMyAdmin)|(pma_)|(phpmyadmin))
        scope: response body
        sensitive: false
        description: phpMyAdmin 指纹

      - name: Adminer
        loaded: true
        f_regex: ((Adminer)|(adminer)|(select database))
        scope: response body
        sensitive: false
        description: Adminer 指纹

  # ==================== Maybe Vulnerability 潜在漏洞 ====================
  - group: Maybe Vulnerability
    rule:
      - name: Java Deserialization
        loaded: true
        f_regex: (javax\.faces\.ViewState)
        scope: response body
        sensitive: false
        description: Java 反序列化漏洞

      - name: Debug Logic Parameters
        loaded: true
        f_regex: ((access=)|(adm=)|(admin=)|(alter=)|(cfg=)|(clone=)|(config=)|(create=)|(dbg=)|(debug=)|(delete=)|(disable=)|(edit=)|(enable=)|(exec=)|(execute=)|(grant=)|(load=)|(make=)|(modify=)|(rename=)|(reset=)|(root=)|(shell=)|(test=)|(toggl=))
        scope: request
        sensitive: false
        description: 调试参数

      - name: URL As A Value
        loaded: true
        f_regex: (=(https?)(://|%3a%2f%2f))
        scope: any
        sensitive: false
        description: URL 作为参数值

      - name: Upload Form
        loaded: true
        f_regex: (type=\"file\")
        scope: response body
        sensitive: false
        description: 文件上传表单

  # ==================== Basic Information 基础信息 ====================
  - group: Basic Information
    rule:
      - name: Chinese IDCard
        loaded: true
        f_regex: '[^0-9]((\d{8}(0\d|10|11|12)([0-2]\d|30|31)\d{3}[^\dXx])|(\d{6}(18|19|20)\d{2}(0[1-9]|10|11|12)([0-2]\d|30|31)\d{3}(\d|X|x))[^^0-9]'
        scope: response body
        sensitive: true
        description: 中国身份证号

      - name: Chinese Mobile Number
        loaded: true
        f_regex: '[^\w]((?:(?:\+|00)86)?1(?:(?:3[\d])|(?:4[5-79])|(?:5[0-35-9])|(?:6[5-7])|(?:7[0-8])|(?:8[\d])|(?:9[189]))\d{8})[^\w]'
        scope: response body
        sensitive: true
        description: 中国手机号

      - name: Internal IP Address
        loaded: true
        f_regex: '[^0-9]((127\.0\.0\.1)|(10\.\d{1,3}\.\d{1,3}\.\d{1,3})|(172\.((1[6-9])|(2\d)|(3[01]))\.\d{1,3}\.\d{1,3})|(192\.168\.\d{1,3}\.\d{1,3}))[^0-9]'
        scope: response
        sensitive: true
        description: 内网 IP 地址

      - name: MAC Address
        loaded: true
        f_regex: (^([a-fA-F0-9]{2}(:[a-fA-F0-9]{2}){5})|[^a-zA-Z0-9]([a-fA-F0-9]{2}(:[a-fA-F0-9]{2}){5}))
        scope: response
        sensitive: true
        description: MAC 地址

  # ==================== Sensitive Information 敏感信息 ====================
  - group: Sensitive Information
    rule:
      - name: Cloud Key
        loaded: true
        f_regex: (((access)(|-|_)(key)(|-|_)(id|secret))|(LTAI[a-z0-9]{12,20}))
        scope: any
        sensitive: true
        description: 云服务 Key (阿里云等)

      - name: AWS Access Key
        loaded: true
        f_regex: (AKIA[0-9A-Z]{16})
        scope: any
        sensitive: true
        description: AWS Access Key ID

      - name: AWS Secret Key
        loaded: true
        f_regex: ([a-zA-Z0-9/+=]{40})
        scope: any
        sensitive: true
        description: AWS Secret Access Key

      - name: Windows File/Dir Path
        loaded: true
        f_regex: '[^\w](([a-zA-Z]:\\(?:\w+\\?)*)|([a-zA-Z]:\\(?:\w+\\)*\w+\.\w+))'
        scope: response
        sensitive: true
        description: Windows 文件路径

      - name: Password Field
        loaded: true
        f_regex: ((|'|")(|[\w]{1,10})([p](ass|wd|asswd|assword))(|[\w]{1,10})(|'|")(:|=)(
          |)('|")(.*?)('|")(|,))
        scope: response body
        sensitive: true
        description: 密码字段

      - name: Username Field
        loaded: true
        f_regex: ((|'|")(|[\w]{1,10})([u](ser|name|sername))|(account)|((((create|update)((d|r)|(by|on|at)))|(creator))))(|[\w]{1,10})(|'|")(:|=)(
          |)('|")(.*?)('|")(|,))
        scope: response body
        sensitive: true
        description: 用户名字段

      - name: WeCom Key
        loaded: true
        f_regex: ((corp)(id|secret))
        scope: response body
        sensitive: true
        description: 企业微信 Key

      - name: JDBC Connection
        loaded: true
        f_regex: (jdbc:[a-z:]+://[a-z0-9.\-_:;=/@?,&]+)
        scope: any
        sensitive: true
        description: JDBC 连接字符串

      - name: Authorization Header
        loaded: true
        f_regex: ((basic [a-z0-9=:_\+\/-]{5,100})|(bearer [a-z0-9_.=:\+\/-]{5,100}))
        scope: response body
        sensitive: true
        description: Authorization 认证头

      - name: Sensitive Field
        loaded: true
        f_regex: ((\[)?('|")?([\w]{0,10})((key)|(secret)|(token)|(config)|(auth)|(access)|(admin))([\w]{0,10})('|")?(\])?(
          |)(:|=)( |)('|")(.*?)('|")(|,))
        scope: response
        sensitive: true
        description: 敏感字段

  # ==================== Other 其他 ====================
  - group: Other
    rule:
      - name: Source Map
        loaded: true
        f_regex: (\.js\.map)
        scope: response body
        sensitive: false
        description: Source Map 文件

      - name: URL Schemes
        loaded: true
        f_regex: ((?![http]|[https])(([-A-Za-z0-9]{1,20})://[-A-Za-z0-9+&@#/%?=~_|!:,.;]+[-A-Za-z0-9+&@#/%=~_|]))
        scope: response body
        sensitive: false
        description: URL Schemes

      - name: Router Push
        loaded: true
        f_regex: (\$router\.push)
        scope: response body
        sensitive: false
        description: Vue Router 路由

      - name: API Path Pattern
        loaded: true
        f_regex: (/api/[a-zA-Z0-9_/-]+)
        scope: any
        sensitive: false
        description: API 路径模式

      - name: Internal Host
        loaded: true
        f_regex: (host\.internal)|(corp\.local)|(company\.local)
        scope: any
        sensitive: true
        description: 内部主机名

      - name: Stack Trace
        loaded: true
        f_regex: (at\s+[\w.$]+\([^)]+\))
        scope: response body
        sensitive: false
        description: 堆栈跟踪

  # ==================== API Security API 安全 ====================
  - group: API Security
    rule:
      - name: SQL Error
        loaded: true
        f_regex: (sql|syntax|error|mysql|postgres|oracle|sqlite)
        scope: response body
        sensitive: false
        description: SQL 错误信息

      - name: Java StackTrace
        loaded: true
        f_regex: (java\.|Exception|at\s+com\.)
        scope: response body
        sensitive: false
        description: Java 堆栈跟踪

      - name: .NET StackTrace
        loaded: true
        f_regex: (System\.|at\s+[\w]+\.[\w]+\()
        scope: response body
        sensitive: false
        description: .NET 堆栈跟踪

      - name: PHP Error
        loaded: true
        f_regex: (PHP (Warning|Error|Fatal)|stack trace)
        scope: response body
        sensitive: false
        description: PHP 错误

      - name: Python Error
        loaded: true
        f_regex: (Traceback \(most recent call last\)|(Python\.\w+Error)
        scope: response body
        sensitive: false
        description: Python 错误

  # ==================== SQL Injection SQL 注入 ====================
  - group: SQL Injection
    rule:
      - name: MySQL Error
        loaded: true
        f_regex: ((MySQLSyntaxErrorException)|(Dynamic SQL Error)|(com\.mysql\.jdbc)|(mysql_fetch))
        scope: response body
        sensitive: false
        description: MySQL SQL 注入错误

      - name: PostgreSQL Error
        loaded: true
        f_regex: ((PG::SyntaxError)|(org\.postgresql\.util\.PSQLException)|(ERROR:\s+syntax error))
        scope: response body
        sensitive: false
        description: PostgreSQL SQL 注入错误

      - name: Oracle Error
        loaded: true
        f_regex: ((ORA-\d{5})|(oracle\.jdbc)|(SQLException))
        scope: response body
        sensitive: false
        description: Oracle SQL 注入错误

      - name: MSSQL Error
        loaded: true
        f_regex: ((Microsoft SQL Native Client)|(Unclosed quotation mark)|(SQLServer JDBC)|(mssql_))
        scope: response body
        sensitive: false
        description: MSSQL SQL 注入错误

      - name: SQLite Error
        loaded: true
        f_regex: ((SQLite\.SQLiteException)|(sqlite3\.OperationalError)|(LIMIT clause))
        scope: response body
        sensitive: false
        description: SQLite SQL 注入错误

      - name: SQL Generic Error
        loaded: true
        f_regex: ((sql (syntax|error|exception))|(SQL error)|(SQL syntax)|(SQLITE_)|(SQL_ERROR))
        scope: response body
        sensitive: false
        description: 通用 SQL 错误

      - name: SQL Injection Payloads
        loaded: true
        f_regex: ((' or ''=')|(-- )|(; drop )|(union select)|(union all select))
        scope: request
        sensitive: false
        description: SQL 注入 Payload 特征

      - name: SQL Time-based Blind
        loaded: true
        f_regex: ((sleep\(\d+\))|(waitfor delay)|(benchmark\())
        scope: request
        sensitive: false
        description: SQL 时间盲注特征

      - name: SQL Error Based
        loaded: true
        f_regex: ((extractvalue)|(updatexml)|(exp\(~\))
        scope: request
        sensitive: false
        description: SQL 报错注入特征

      - name: SQL Union Select
        loaded: true
        f_regex: ((union\s+(all\s+)?select)|(order\s+by\s+\d+))
        scope: request
        sensitive: false
        description: SQL Union 注入特征

      - name: SQL Boolean Blind
        loaded: true
        f_regex: (((true|false)\( )|(IF\( ))
        scope: request
        sensitive: false
        description: SQL 布尔盲注特征

      - name: SQL Comment Injection
        loaded: true
        f_regex: ((\/\*.*\*\/)|(--\s*$)|(#\s*\w+))
        scope: request
        sensitive: false
        description: SQL 注释注入特征

      - name: SQL Stacked Queries
        loaded: true
        f_regex: ((;\s*(select|insert|update|delete|drop|create|alter)))
        scope: request
        sensitive: false
        description: SQL 堆叠查询特征

      - name: SQL OR Injection
        loaded: true
        f_regex: (('\s+or\s+')|("\s+or\s+")|('\s+or\s+\d+=\d+))
        scope: request
        sensitive: false
        description: SQL OR 注入特征

      - name: SQL AND Injection
        loaded: true
        f_regex: (('\s+and\s+')|("\s+and\s+")|('\s+and\s+\d+=\d+))
        scope: request
        sensitive: false
        description: SQL AND 注入特征

      - name: SQL Hex Evasion
        loaded: true
        f_regex: ((0x[0-9a-fA-F]+)|(char\(\d+\)))
        scope: request
        sensitive: false
        description: SQL 十六进制编码特征

      - name: SQL Double Quote
        loaded: true
        f_regex: (""\s*(or|and)\s+"")
        scope: request
        sensitive: false
        description: SQL 双引号注入

      - name: SQL String Escape
        loaded: true
        f_regex: ((\\' )|(;.*--)|(\|\|.*--))
        scope: request
        sensitive: false
        description: SQL 字符串转义注入

      - name: SQL Information Schema
        loaded: true
        f_regex: ((information_schema)|(sys\.databases)|(mysql\.user))
        scope: response body
        sensitive: false
        description: SQL 信息泄露

      - name: SQL Table Name Leak
        loaded: true
        f_regex: ((Table\s*'\w+\.\w+' doesn't exist)|(Unknown table)|(Table.*doesn't exist))
        scope: response body
        sensitive: false
        description: SQL 表名泄露

      - name: SQL Column Name Leak
        loaded: true
        f_regex: ((Unknown column)|(Column.*not found)|(unknown attribute))
        scope: response body
        sensitive: false
        description: SQL 列名泄露

  # ==================== XSS Cross-Site Scripting ====================
  - group: XSS
    rule:
      - name: XSS Script Tag
        loaded: true
        f_regex: ((<script[^>]*>)|(<\/script>)|(<script))
        scope: response body
        sensitive: false
        description: XSS Script 标签

      - name: XSS Event Handler
        loaded: true
        f_regex: ((onerror\s*=)|(onclick\s*=)|(onload\s*=)|(onmouseover\s*=)|(onfocus\s*=))
        scope: response body
        sensitive: false
        description: XSS 事件处理器

      - name: XSS JavaScript URI
        loaded: true
        f_regex: ((javascript:)|(vbscript:)|(data:text/html))
        scope: response body
        sensitive: false
        description: XSS JavaScript URI

      - name: XSS IMG Tag
        loaded: true
        f_regex: (<img[^>]+(onerror|onclick|onload)\s*=)
        scope: response body
        sensitive: false
        description: XSS IMG 标签

      - name: XSS IFRAME Tag
        loaded: true
        f_regex: (<iframe[^>]*>)|(<\/iframe>)
        scope: response body
        sensitive: false
        description: XSS IFRAME 标签

      - name: XSS SVG Tag
        loaded: true
        f_regex: (<svg[^>]*>)|(<svg.*onerror))
        scope: response body
        sensitive: false
        description: XSS SVG 标签

      - name: XSS Body Tag
        loaded: true
        f_regex: (<body[^>]*onload\s*=)
        scope: response body
        sensitive: false
        description: XSS Body 标签

      - name: XSS Input Tag
        loaded: true
        f_regex: (<input[^>]+(onfocus|onerror|autofocus)\s*=)
        scope: response body
        sensitive: false
        description: XSS Input 标签

      - name: XSS Link Tag
        loaded: true
        f_regex: (<link[^>]+(href|onload)\s*=)
        scope: response body
        sensitive: false
        description: XSS Link 标签

      - name: XSS Object Tag
        loaded: true
        f_regex: (<object[^>]*>)|(<embed[^>]*>)
        scope: response body
        sensitive: false
        description: XSS Object/Embed 标签

      - name: XSS Expression
        loaded: true
        f_regex: ((style\s*=\s*["']?.*expression\s*\()|(url\(['"]?javascript:))
        scope: response body
        sensitive: false
        description: XSS Expression 注入

      - name: XSS Base64 Decode
        loaded: true
        f_regex: ((atob\s*\()|(btoa\s*\()|(fromCharCode\s*\())
        scope: response body
        sensitive: false
        description: XSS Base64 解码

      - name: XSS DOM Access
        loaded: true
        f_regex: ((document\.cookie)|(document\.write)|(innerHTML)|(outerHTML))
        scope: response body
        sensitive: false
        description: XSS DOM 操作

      - name: XSS Payload in Response
        loaded: true
        f_regex: ((<script[^>]*>.*?alert\s*\()|(eval\s*\(.*(getElementById|cookie|localStorage)))
        scope: response body
        sensitive: false
        description: XSS Payload 回显

      - name: XSS Unicode Escape
        loaded: true
        f_regex: ((\\u00[0-9a-fA-F]{2})|(\\x[0-9a-fA-F]{2}))
        scope: response body
        sensitive: false
        description: XSS Unicode 转义

      - name: XSS HTML Entity
        loaded: true
        f_regex: ((&#x?[0-9a-fA-F]+;?)+)
        scope: response body
        sensitive: false
        description: XSS HTML 实体编码

      - name: XSS Reflection
        loaded: true
        f_regex: ((<\[CDATA\[)|(\]\]>)|(<!\[CDATA))
        scope: response body
        sensitive: false
        description: XSS CDATA 标签

      - name: XSS Stored
        loaded: true
        f_regex: ((stored.*script)|(persistent.*xss)|(saved.*xss))
        scope: response body
        sensitive: false
        description: XSS 存储型特征

  # ==================== Path Traversal 路径遍历 ====================
  - group: Path Traversal
    rule:
      - name: Path Traversal Linux
        loaded: true
        f_regex: ((\.\.\/)|(\.\.\\)|(\.\.%2f)|(\.\.%5c))
        scope: any
        sensitive: false
        description: Linux 路径遍历

      - name: Path Traversal Windows
        loaded: true
        f_regex: (((\.\.\\)+)|(%2e%2e)|(%252e))
        scope: any
        sensitive: false
        description: Windows 路径遍历

      - name: Path Traversal Null Byte
        loaded: true
        f_regex: ((\.\.%00)|(\.\.%2500)|(%00\.\.)|(null byte injection))
        scope: any
        sensitive: false
        description: 路径遍历空字节注入

      - name: File Inclusion Remote
        loaded: true
        f_regex: ((php:\/\/input)|(file:\/\/)|(phar:\/\/)|(zip:\/\/))
        scope: any
        sensitive: false
        description: 远程文件包含

      - name: File Inclusion Local
        loaded: true
        f_regex: ((include\s*\(.*\$_)|(require\s*\(.*\$)|(include_once|require_once))
        scope: response body
        sensitive: false
        description: 本地文件包含特征

      - name: File Read Payload
        loaded: true
        f_regex: ((etc\/passwd)|(windows\/system32)|(c:\\windows))
        scope: any
        sensitive: false
        description: 敏感文件路径读取

      - name: Log File Access
        loaded: true
        f_regex: ((\/var\/log\/)|(\/tmp\/)|(\.\/logs\/)|(\/proc\/self))
        scope: any
        sensitive: false
        description: 日志文件访问

      - name: Config File Access
        loaded: true
        f_regex: ((config\.php)|(\.env)|(database\.yml)|(application\.properties))
        scope: any
        sensitive: false
        description: 配置文件访问

      - name: SSH Key Access
        loaded: true
        f_regex: ((id_rsa)|(id_dsa)|(\.ssh\/authorized_keys)|(\.ssh\/config))
        scope: any
        sensitive: false
        description: SSH 密钥访问

      - name: Backup File Access
        loaded: true
        f_regex: (((\.bak)|(\.backup)|(\.old)|(\.swp)|(\.tmp)|(\.temp))\s*$)
        scope: any
        sensitive: false
        description: 备份文件访问

      - name: Directory Listing
        loaded: true
        f_regex: ((Index of \/)|(\[To Parent Directory\])|(Directory Listing))
        scope: response body
        sensitive: false
        description: 目录遍历特征

      - name: Webroot Path
        loaded: true
        f_regex: ((DocumentRoot)|(ServerRoot)|(public_html)|(htdocs))
        scope: response body
        sensitive: false
        description: Web 根目录泄露

  # ==================== SSRF Server-Side Request Forgery ====================
