  # ==================== Information Disclosure 信息泄露 ====================
  - group: Information Disclosure
    rule:
      - name: Version Info
        loaded: true
        f_regex: ((Server\s*:)|(X-Powered-By\s*:)|(X-Generator\s*:))
        scope: response header
        sensitive: false
        description: 版本信息泄露

      - name: Error Stack Trace
        loaded: true
        f_regex: ((at\s+[\w.$]+\.[\w.$]+\.[\w.$]+\()|(Exception in thread)|(java\.lang\.\w+Exception))
        scope: response body
        sensitive: false
        description: 错误堆栈泄露

      - name: Debug Mode
        loaded: true
        f_regex: ((DEBUG\s*=\s*true)|(debug.*mode)|(development.*mode))
        scope: response body
        sensitive: false
        description: 调试模式开启

      - name: Internal IP Disclosure
        loaded: true
        f_regex: ((10\.\d{1,3}\.\d{1,3}\.\d{1,3})|(172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3})|(192\.168\.\d{1,3}\.\d{1,3}))
        scope: response body
        sensitive: true
