  # ==================== Command Injection 命令注入 ====================
  - group: Command Injection
    rule:
      - name: Command Injection Pipes
        loaded: true
        f_regex: ((\|.*\||;&|\|&\$))
        scope: any
        sensitive: false
        description: 命令管道注入

      - name: Command Injection Semicolon
        loaded: true
        f_regex: (;(wget|curl|nc|bash|sh|cmd|powershell))
        scope: any
        sensitive: false
        description: 分号命令注入

      - name: Command Injection Backtick
        loaded: true
        f_regex: (`[^`]+`)
        scope: any
        sensitive: false
        description: 反引号命令注入

      - name: Command Injection Dollar
        loaded: true
        f_regex: (\$\([^)]+\)|\$\{[^}]+\})
        scope: any
        sensitive: false
        description: $() 命令注入

      - name: Command Injection Newline
        loaded: true
        f_regex: (%0a|%0d|\\r\\n|\\n)
        scope: any
        sensitive: false
        description: 换行符注入

      - name: Common Commands
        loaded: true
        f_regex: ((ls\s+-la)|(cat\s+/etc)|(whoami)|(id\s+))
        scope: any
        sensitive: false
        description: 常见命令执行

      - name: Reverse Shell Pattern
        loaded: true
        f_regex: ((bash\s+-i)|(nc\s+-e)|(perl\s+-e)|(python.*socket)|(rm\s+\/tmp))
        scope: any
        sensitive: false
        description: 反向 shell 模式

