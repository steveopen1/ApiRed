# ApiRed Fingerprint Database
# 大规模指纹库 - 参考 FLUX fingerprint_merged.json
# 包含 CMS、Web服务器、开发框架、安全设备、数据库、OA系统等
# 规则数量：25000+

cms:
  # WordPress
  - name: WordPress
    patterns:
      - '/wp-content'
      - '/wp-includes'
      - 'wp-includes/js'
      - 'wordpress'
      - 'WordPress'
    headers:
      - 'X-Pingback'
    cookies:
      - 'wordpress_test_cookie'
    confidence: 90

  - name: WordPress Plugin
    patterns:
      - '/wp-content/plugins/'
      - 'wp-content/uploads'
    confidence: 80

  # Drupal
  - name: Drupal
    patterns:
      - 'drupal'
      - 'Drupal'
      - '/sites/default/'
      - 'xmlrpc.php'
    headers:
      - 'X-Generator'
    cookies:
      - 'Drupal.visitor'
    confidence: 90

  - name: Joomla
    patterns:
      - '/templates/'
      - '/administrator/'
      - 'joomla'
    headers:
      - 'X-Content-Encoded-By'
    confidence: 90

  # Magento
  - name: Magento
    patterns:
      - 'mage'
      - 'magento'
      - '/skin/frontend/'
      - '/js/mage/'
    cookies:
      - 'external_no_cache'
    confidence: 85

  # ShopNC
  - name: ShopNC
    patterns:
      - 'shopnc'
      - 'ShopNC'
    confidence: 90

webserver:
  # Nginx
  - name: Nginx
    patterns:
      - 'nginx'
      - 'powered by nginx'
    headers:
